
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneHub • iPhone 16 Pro Max</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="public/css/product-detail.css">
</head>
<body>

    <!-- Navbar -->

    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <section class="py-5 py-lg-5">
        <div class="container">

            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb small">
                    <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
                    <li class="breadcrumb-item"><a href="../public/shop.html">Shop</a></li>
                    <li class="breadcrumb-item active text-cyan" aria-current="page">iPhone 16 Pro Max</li>
                </ol>
            </nav>

            <div class="row g-5">

                <!-- Images Column -->
                <div class="col-lg-7">
                    <div class="main-image-container mb-4">
                        <img id="main-image" class="main-image" src="" alt="Product">
                    </div>

                    <!-- Thumbnails -->
                    <div class="d-flex overflow-auto gap-3 pb-2" id="thumbnails-container" style="scrollbar-width: thin;">
                        <!-- Generated by JS -->
                    </div>
                </div>

                <!-- Info Column -->
                <div class="col-lg-5">
                    <div class="sticky-top" style="top: 80px;">
                        <div id="brand" class="text-cyan fw-bold small text-uppercase tracking-wider mb-2"></div>
                        <h1 id="name" class="fw-bold display-5 mb-3"></h1>

                        <div class="d-flex align-items-center gap-3 mb-4">
                            <div id="price" class="display-5 fw-bold text-cyan"></div>
                            <span class="badge bg-success px-3 py-2 rounded-pill fs-5">In Stock</span>
                        </div>

                        <p id="description" class="lead text-secondary mb-5"></p>

                        <!-- Quick Specs -->
                        <div class="row g-3 mb-5" id="specs-box">

                            <div class="col-6 col-md-3">
                                <div class="bg-dark p-3 rounded text-center">
                                    <small class="text-secondary">Storage</small><br>
                                    <strong id="spec-storage">-</strong>
                                </div>
                            </div>

                            <div class="col-6 col-md-3">
                                <div class="bg-dark p-3 rounded text-center">
                                    <small class="text-secondary">RAM</small><br>
                                    <strong id="spec-ram">-</strong>
                                </div>
                            </div>

                            <div class="col-6 col-md-3">
                                <div class="bg-dark p-3 rounded text-center">
                                    <small class="text-secondary">Screen</small><br>
                                    <strong id="spec-screen">-</strong>
                                </div>
                            </div>

                            <div class="col-6 col-md-3">
                                <div class="bg-dark p-3 rounded text-center">
                                    <small class="text-secondary">Battery</small><br>
                                    <strong id="spec-battery">-</strong>
                                </div>
                            </div>

                        </div>

                        <!-- CTA -->
                        <div class="d-grid gap-3">
                            <button id="add-to-cart-btn" class="btn btn-cyan-gradient btn-lg py-4 fw-bold fs-5">
                                <i class="bi bi-cart-plus me-2 fs-4"></i> Add to Cart – Free Delivery
                            </button>
                            <button class="btn btn-outline-light btn-lg py-3" onclick="history.back()">
                                ← Back to Shop
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

        <!-- Add to Cart Confirmation Modal -->
    <div class="modal fade" id="addToCartModal" tabindex="-1" aria-labelledby="addToCartModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-0" style="border-radius: 1.25rem;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title" id="addToCartModalLabel">Added to Cart</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center py-4">
                <i class="bi bi-check-circle-fill text-cyan" style="font-size: 3.5rem;"></i>
                <h5 class="mt-3 mb-2">Successfully added!</h5>
                <p class="text-secondary mb-1" id="confirm-product-name"></p>
                <small class="text-secondary">You can continue shopping or view your cart.</small>
            </div>
            <div class="modal-footer border-0 justify-content-center gap-3 pb-4">
                <button type="button" class="btn btn-outline-light px-4" data-bs-dismiss="modal">Continue Shopping</button>
               
            </div>
            </div>
        </div>
    </div>

    <!-- Cart Offcanvas -->
    <div class="offcanvas offcanvas-end bg-dark text-white" tabindex="-1" id="cartOffcanvas">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title d-flex align-items-center gap-2">
                <i class="bi bi-cart2 fs-4"></i> Your Cart
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="cart-items">
            <!-- Cart items go here -->
        </div>
        <div class="offcanvas-footer p-4 border-top border-secondary">
            <div class="d-flex justify-content-between mb-3">
                <span>Subtotal</span>
                <span id="cart-subtotal" class="fw-bold">$0</span>
            </div>
            <div class="d-flex justify-content-between mb-4">
                <span>Total</span>
                <span id="cart-total" class="fs-4 fw-bold text-cyan">$0</span>
            </div>
            <button class="btn btn-cyan-gradient btn-lg w-100 py-3 fw-bold mb-3">
                PROCEED TO CHECKOUT
            </button>
            <button class="btn btn-link text-secondary w-100" data-bs-dismiss="offcanvas">
                Continue Shopping
            </button>
        </div>
    </div>
    <!-- Footer will be loaded here -->
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="assets/js/script.js"></script>
    <script src="assets/js/products-data.js"></script>
    <script src="../public/js/product_detail.js"></script>

            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(err => console.error('Error loading footer:', err));
    </script> -->
</body>
</html>
