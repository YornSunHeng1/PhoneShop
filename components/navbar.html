<!-- 
  PhoneHub Navbar - Full version with:
  - Glassmorphism + blur
  - Scroll hide/show on mobile-friendly behavior
  - Brands mega dropdown
  - Search + Cart icon with badge
  - Bootstrap 5 + Bootstrap Icons
-->

<nav class="navbar navbar-expand-lg navbar-dark fixed-top py-3 transition-all"
     style="background: rgba(0, 0, 0, 0.82); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 1030;">
  <div class="container-xl">

    <!-- Brand / Logo -->
    <a class="navbar-brand d-flex align-items-center gap-3" href="index.html">
      <div class="brand-icon d-flex align-items-center justify-content-center rounded-3 fw-bold shadow-lg"
           style="width:48px; height:48px; background: linear-gradient(135deg, #00d4ff, #4facfe); color: #000;">
        <i class="bi bi-phone-vibrate fs-4"></i>
      </div>
      <span class="fs-4 fw-bold text-white tracking-tight">
        Phone<span class="text-cyan">Hub</span>
      </span>
    </a>

    <!-- Toggler for mobile -->
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Main content -->
    <div class="collapse navbar-collapse" id="navbarContent">

      <!-- Center navigation links -->
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-1 gap-lg-4">

        <li class="nav-item">
          <a class="nav-link nav-link-custom active" aria-current="page" href="../index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link nav-link-custom active" aria-current="page" href="../public/shop.html">Shop</a>
        </li>

        <li class="nav-item dropdown">
          <a class="nav-link nav-link-custom dropdown-toggle" href="#" id="brandDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Brands
          </a>
          <div class="dropdown-menu dropdown-menu-dark border-0 shadow-2xl mt-3 p-4 rounded-4"
               style="background: rgba(18,18,25,0.96); min-width: 520px; border: 1px solid rgba(80, 172, 254, 0.18);">
            <div class="row g-3">
              <div class="col-12 mb-3">
                <h6 class="text-uppercase text-secondary fw-bold small tracking-wider px-2">Popular Brands</h6>
              </div>
              <div class="col-6 col-md-4">
                <a class="dropdown-item rounded-3 py-2 px-3" href="#" onclick="filterCategory('Apple')">
                  <i class="bi bi-apple me-2 text-white-50"></i> Apple
                </a>
              </div>
              <div class="col-6 col-md-4">
                <a class="dropdown-item rounded-3 py-2 px-3" href="#" onclick="filterCategory('Samsung')">
                  <i class="bi bi-phone me-2 text-white-50"></i> Samsung
                </a>
              </div>
              <div class="col-6 col-md-4">
                <a class="dropdown-item rounded-3 py-2 px-3" href="#" onclick="filterCategory('Google')">
                  <i class="bi bi-google me-2 text-white-50"></i> Google Pixel
                </a>
              </div>
              <div class="col-6 col-md-4">
                <a class="dropdown-item rounded-3 py-2 px-3" href="#" onclick="filterCategory('Xiaomi')">Xiaomi</a>
              </div>
              <div class="col-6 col-md-4">
                <a class="dropdown-item rounded-3 py-2 px-3" href="#" onclick="filterCategory('OnePlus')">OnePlus</a>
              </div>
              <div class="col-6 col-md-4">
                <a class="dropdown-item rounded-3 py-2 px-3" href="#" onclick="filterCategory('Oppo')">OPPO</a>
              </div>
              <div class="col-12 mt-3 pt-3 border-top border-secondary-subtle">
                <a class="dropdown-item text-center text-info fw-bold py-2" href="#" onclick="filterCategory('all')">
                  View All Brands →
                </a>
              </div>
            </div>
          </div>
        </li>

        <li class="nav-item">
          <a class="nav-link nav-link-custom" href="#" onclick="document.getElementById('about')?.scrollIntoView({behavior:'smooth'})">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link nav-link-custom" href="#contact">Contact</a>
        </li>
      </ul>

      <!-- Right side: Search + Cart -->
      <div class="d-flex align-items-center gap-3 ms-lg-4">

        <!-- Search (visible on xl+) -->
        <div class="search-box d-none d-xl-block">
          <div class="input-group input-group-sm">
            <span class="input-group-text bg-dark border-0 text-secondary rounded-start-pill ps-3">
              <i class="bi bi-search"></i>
            </span>
            <input id="search-input" onkeyup="searchProducts()"
                   class="form-control bg-dark border-0 text-white rounded-end-pill py-2"
                   type="search" placeholder="Search phones..." style="width: 240px;">
          </div>
        </div>

        <!-- Cart icon with badge -->
        <button class="btn btn-icon position-relative text-white border-0 p-2 fs-5" 
                data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" aria-label="Shopping Cart">
          <i class="bi bi-bag-heart"></i>
          <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-circle bg-danger small">
            0
          </span>
        </button>

      </div>
    </div>
  </div>
</nav>
